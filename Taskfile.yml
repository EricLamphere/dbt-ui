version: '3'

vars:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend

tasks:
  # ---- Development ----

  dev:backend:
    desc: Start the FastAPI backend in dev mode (hot reload)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - .venv/bin/uvicorn app.main:app --reload --host 127.0.0.1 --port 8001
    env:
      DBT_UI_DATA_DIR: "{{.ROOT_DIR}}/data"
      DBT_UI_FRONTEND_DIST: "{{.ROOT_DIR}}/frontend/dist"

  dev:frontend:
    desc: Start the Vite dev server
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run dev

  start:
    desc: Start backend and frontend dev servers in parallel (foreground, logs to terminal)
    deps:
      - task: dev:backend
      - task: dev:frontend

  start:bg:
    desc: Start backend and frontend as background daemons, then open browser
    cmds:
      - mkdir -p "{{.ROOT_DIR}}/data/logs"
      - |
        cd "{{.ROOT_DIR}}/backend" && \
        DBT_UI_DATA_DIR="{{.ROOT_DIR}}/data" \
        DBT_UI_FRONTEND_DIST="{{.ROOT_DIR}}/frontend/dist" \
        .venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8001 \
          > "{{.ROOT_DIR}}/data/logs/backend.log" 2>&1 &
        echo $! > "{{.ROOT_DIR}}/data/backend.pid"
      - |
        cd "{{.ROOT_DIR}}/frontend" && \
        npm run dev -- --host 127.0.0.1 \
          > "{{.ROOT_DIR}}/data/logs/frontend.log" 2>&1 &
        echo $! > "{{.ROOT_DIR}}/data/frontend.pid"
      - sleep 2
      - open http://localhost:5173 || xdg-open http://localhost:5173 2>/dev/null || true
      - echo "dbt-ui running. Logs in data/logs/. Run 'task stop' to shut down."

  kill:ports:
    desc: Kill any processes using the backend (8001) and frontend (5173) ports
    cmds:
      - |
        for port in 8001 5173; do
          pids=$(lsof -ti tcp:$port 2>/dev/null)
          if [ -n "$pids" ]; then
            echo "$pids" | xargs kill -9
            echo "Killed processes on port $port: $pids"
          else
            echo "No process on port $port"
          fi
        done

  stop:
    desc: Stop background dbt-ui daemons started by task start:bg
    cmds:
      - |
        for pidfile in "{{.ROOT_DIR}}/data/backend.pid" "{{.ROOT_DIR}}/data/frontend.pid"; do
          if [ -f "$pidfile" ]; then
            pid=$(cat "$pidfile")
            if kill -0 "$pid" 2>/dev/null; then
              kill "$pid"
              echo "Stopped PID $pid"
            else
              echo "PID $pid already stopped"
            fi
            rm -f "$pidfile"
          else
            echo "No pidfile at $pidfile"
          fi
        done

  # ---- Install ----

  install:list-pythons:
    desc: List available python3.x interpreters on PATH
    cmds:
      - |
        echo "Available Python interpreters:"
        for py in python3 python3.11 python3.12 python3.13 python3.14; do
          if command -v "$py" >/dev/null 2>&1; then
            echo "  $py  ($($py --version 2>&1))"
          fi
        done
        echo ""
        echo "Usage: task install PYTHON=python3.12"

  install:backend:
    desc: "Install Python dependencies into a virtualenv (override interpreter: task install:backend PYTHON=python3.12)"
    dir: "{{.BACKEND_DIR}}"
    vars:
      PYTHON: '{{.PYTHON | default "python3"}}'
    cmds:
      - '{{.PYTHON}} -m venv .venv'
      - .venv/bin/pip install -e ".[dev]"

  install:frontend:
    desc: Install Node dependencies
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm install

  install:
    desc: "Install all dependencies (override Python: task install PYTHON=python3.12)"
    cmds:
      - task: install:backend
        vars:
          PYTHON: '{{.PYTHON | default "python3"}}'
      - task: install:frontend

  # ---- Tests ----

  test:backend:
    desc: Run the backend pytest suite
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - .venv/bin/pytest --cov=app --cov-report=term-missing -q

  test:frontend:
    desc: Type-check and build the frontend
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run build

  test:
    desc: Run all tests
    cmds:
      - task: test:backend
      - task: test:frontend

  # ---- Lint ----

  lint:
    desc: Run ruff on the backend
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - .venv/bin/ruff check app tests

  # ---- Data ----

  db:reset:
    desc: Delete the local SQLite database (dev only)
    cmds:
      - rm -f data/dbt_ui.sqlite
      - echo "Database reset."
