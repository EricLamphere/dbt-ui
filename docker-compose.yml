services:
  dbt-ui:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: dbt-ui:latest
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Mount your dbt projects directory here.
      # Default: ~/dbt-projects → /workspace inside the container.
      # Override via DBT_UI_WORKSPACE_HOST env var or edit this line.
      - "${DBT_UI_WORKSPACE_HOST:-${HOME}/dbt-projects}:/workspace"
      # Persistent SQLite data
      - dbt_ui_data:/data
    environment:
      DBT_UI_WORKSPACE: /workspace
      DBT_UI_DATA_DIR: /data
      DBT_UI_LOG_LEVEL: ${DBT_UI_LOG_LEVEL:-INFO}
    restart: unless-stopped

volumes:
  dbt_ui_data:
